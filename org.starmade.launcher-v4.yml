# electron-init
id: org.star-made.launcher-v4
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
build-options:
  append-path: /usr/lib/sdk/node24/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
command: run.sh
finish-args:
  - --share=ipc
  - --device=dri
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --env=ELECTRON_TRASH=gio
  - --talk-name=com.canonical.Unity
# starmade-init
buildsystem: simple
build-options:
  env:
    XDG_CACHE_HOME: /run/build/starmade-launcher/flatpak-node/cache
    npm_config_cache: /run/build/starmade-launcher/flatpak-node/npm-cache
    npm_config_nodedir: /usr/lib/sdk/node24
    npm_config_offline: 'true'
subdir: main
sources:
  - type: archive
    url: https://github.com/starmade-community/starmade-launcher-v4/archive/v4.2.17.tar.gz
    sha256: checksum-here
    dest: main
  - flatpak/generated-sources.json
modules:
  - name: starmade-launcher
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/starmade-launcher/flatpak-node/cache
        npm_config_cache: /run/build/starmade-launcher/flatpak-node/npm-cache
        npm_config_offline: 'true'
    build-commands:
      - npm install --offline
      - npm run electron:build
      # bundle build dir
      - cp -a build /app/main
      # add the application to the desktop
      - install -Dm644 org.star-made.launcher-v4.metainfo.xml /app/share/metainfo/org.star-made.launcher-v4.metainfo.xml
      - install -Dm644 org.star-made.launcher-v4.desktop /app/share/applications/org.star-made.launcher-v4.desktop
      - install -Dm644 build/icon.ico /app/share/icons/hicolor/scalable/apps/org.star-made.launcher-v4.ico
    subdir: main
    sources:
